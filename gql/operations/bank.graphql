query BankById($id: ID!, $locale: String!) {
    node(id: $id) {
        __typename
        ... on Bank {
            id
            name
            country
            website
            logoURL
            currencyRates {
                id
                currency
                rate
            }
            offers {
                id
                description
                link
                type
            }
            translation(locale: $locale) {
                name
                description
            }
        }
    }
}
