query GetBank($id: ID!, $locale: String!) {
    bank(id: $id) {
        id
        name
        country
        logoURL
        currencyRates {
            id
            currency
            rate
        }
        website
        offers {
            id
            description
            link
            type
        }
        translation(locale: $locale) {
            name
            description
        }
    }
}