query GetBanks($locale: String!) {
    banks {
        edges {
            node {
                id
                name
                country
                logoURL
                currencyRates {
                    id
                    currency
                    rate
                }
                website
                offers {
                    id
                    description
                    link
                    type
                }
                translation(locale: $locale) {
                    name
                    description
                }
            }
        }
    }
}